<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 宜礼商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-14">
                <a href="index.html" class="flex items-center text-gray-600">
                    <i class="fas fa-arrow-left text-lg"></i>
                </a>
                <h1 class="text-lg font-medium">商品详情</h1>
                <a href="cart.html" class="relative p-2 text-gray-600">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 商品详情 -->
    <main class="max-w-3xl mx-auto pb-24">
        <!-- 商品图片 -->
        <div class="aspect-square bg-gray-100">
            <img id="productImage" src="" alt="" class="w-full h-full object-cover">
        </div>
        
        <!-- 商品信息 -->
        <div class="bg-white p-4">
            <div class="flex items-center gap-2 mb-2">
                <span id="productType" class="px-2 py-0.5 text-xs rounded-full"></span>
            </div>
            <h1 id="productName" class="text-xl font-bold text-gray-800 mb-2"></h1>
            <p id="productDesc" class="text-gray-500 text-sm mb-4"></p>
            <div class="flex items-baseline gap-2">
                <span class="text-2xl font-bold text-red-500">¥<span id="productPrice"></span></span>
                <span id="productOriginalPrice" class="text-gray-400 line-through"></span>
            </div>
            <div class="mt-4 flex items-center text-sm text-gray-500">
                <i class="fas fa-box mr-2"></i>
                <span>库存: <span id="productStock"></span></span>
            </div>
        </div>
        
        <!-- 购买数量 -->
        <div class="bg-white mt-2 p-4">
            <div class="flex items-center justify-between">
                <span class="text-gray-700">购买数量</span>
                <div class="flex items-center border rounded-lg">
                    <button onclick="changeQuantity(-1)" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100">
                        <i class="fas fa-minus text-sm"></i>
                    </button>
                    <span id="quantity" class="w-12 text-center font-medium">1</span>
                    <button onclick="changeQuantity(1)" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-gray-100">
                        <i class="fas fa-plus text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部操作栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 safe-area-bottom">
        <div class="max-w-3xl mx-auto flex gap-3">
            <button onclick="addToCart()" class="flex-1 py-3 border-2 border-purple-600 text-purple-600 rounded-full font-medium hover:bg-purple-50 transition">
                加入购物车
            </button>
            <button onclick="buyNow()" class="flex-1 py-3 bg-purple-600 text-white rounded-full font-medium hover:bg-purple-700 transition">
                立即购买
            </button>
        </div>
    </div>

    <script>
        let product = null;
        let quantity = 1;
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }
            loadProduct();
            updateCartBadge();
        });
        
        // 加载商品详情
        async function loadProduct() {
            try {
                const response = await fetch(`/api/data?action=shop_product&id=${productId}`);
                const result = await response.json();
                if (result.success) {
                    product = result.data;
                    renderProduct();
                } else {
                    alert('商品不存在');
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('加载商品失败:', error);
            }
        }
        
        // 渲染商品信息
        function renderProduct() {
            document.getElementById('productImage').src = product.images[0];
            document.getElementById('productImage').alt = product.name;
            document.getElementById('productName').textContent = product.name;
            document.getElementById('productDesc').textContent = product.description;
            document.getElementById('productPrice').textContent = product.price;
            document.getElementById('productStock').textContent = product.stock;
            
            if (product.originalPrice > product.price) {
                document.getElementById('productOriginalPrice').textContent = `¥${product.originalPrice}`;
            } else {
                document.getElementById('productOriginalPrice').style.display = 'none';
            }
            
            const typeEl = document.getElementById('productType');
            if (product.type === 'virtual') {
                typeEl.className = 'px-2 py-0.5 text-xs rounded-full bg-blue-100 text-blue-600';
                typeEl.textContent = '电子卡券';
            } else {
                typeEl.className = 'px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-600';
                typeEl.textContent = '实物商品';
            }
        }
        
        // 修改数量
        function changeQuantity(delta) {
            quantity += delta;
            if (quantity < 1) quantity = 1;
            if (product && quantity > product.stock) quantity = product.stock;
            document.getElementById('quantity').textContent = quantity;
        }
        
        // 添加到购物车
        function addToCart() {
            if (!product) return;
            
            const existingItem = cart.find(item => item.productId === product.id);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({
                    productId: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.images[0],
                    type: product.type,
                    quantity: quantity
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showToast('已添加到购物车');
        }
        
        // 立即购买
        function buyNow() {
            if (!product) return;
            
            // 清空购物车，只保留当前商品
            cart = [{
                productId: product.id,
                name: product.name,
                price: product.price,
                image: product.images[0],
                type: product.type,
                quantity: quantity
            }];
            localStorage.setItem('cart', JSON.stringify(cart));
            
            // 跳转到结算页
            window.location.href = 'checkout.html';
        }
        
        // 更新购物车徽章
        function updateCartBadge() {
            const badge = document.getElementById('cartCount');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm z-50';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
