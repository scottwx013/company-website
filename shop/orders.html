<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 宜礼商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .order-card { transition: all 0.3s ease; }
        .order-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .status-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-paid { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #e0e7ff; color: #3730a3; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #f3f4f6; color: #6b7280; }
        .tab-active { color: #7c3aed; border-bottom: 2px solid #7c3aed; }
        .tab-inactive { color: #6b7280; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/shop/" class="flex items-center">
                    <img src="/assets/logo-purple.jpg" alt="宜礼" class="h-8 w-auto">
                    <span class="ml-2 text-xl font-bold text-gray-800">商城</span>
                </a>
                <div class="flex items-center space-x-4">
                    <a href="/shop/" class="p-2 text-gray-600 hover:text-purple-600"><i class="fas fa-home text-xl"></i></a>
                    <a href="cart.html" class="relative p-2 text-gray-600 hover:text-purple-600">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                    </a>
                    <div id="userSection" class="flex items-center space-x-2">
                        <a href="login.html" class="text-sm text-purple-600 hover:text-purple-700 font-medium">登录</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">我的订单</h1>
            <p class="text-gray-500 mt-1">查看和管理您的所有订单</p>
        </div>

        <div class="bg-white rounded-lg shadow-sm mb-6">
            <div class="flex overflow-x-auto">
                <button class="tab-btn tab-active flex-1 py-4 text-sm font-medium whitespace-nowrap transition" data-status="all">全部订单</button>
                <button class="tab-btn tab-inactive flex-1 py-4 text-sm font-medium whitespace-nowrap transition" data-status="pending">待付款</button>
                <button class="tab-btn tab-inactive flex-1 py-4 text-sm font-medium whitespace-nowrap transition" data-status="paid">待发货</button>
                <button class="tab-btn tab-inactive flex-1 py-4 text-sm font-medium whitespace-nowrap transition" data-status="shipped">待收货</button>
                <button class="tab-btn tab-inactive flex-1 py-4 text-sm font-medium whitespace-nowrap transition" data-status="completed">已完成</button>
            </div>
        </div>

        <div id="orderList"></div>

        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-32 h-32 mx-auto mb-6 bg-gray-100 rounded-full flex items-center justify-center">
                <i class="fas fa-clipboard-list text-4xl text-gray-400"></i>
            </div>
            <h3 class="text-lg font-medium text-gray-800 mb-2">暂无订单</h3>
            <p class="text-gray-500 mb-6">您还没有任何订单，去逛逛吧~</p>
            <a href="/shop/" class="inline-block px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">去购物</a>
        </div>
    </main>

    <script src="../js/supabase-client.js"></script>
    <script src="shop-data.js"></script>
    <script>
        let currentUser = null;
        let orders = [];
        let currentStatus = 'all';

        const statusMap = {
            pending: { text: '待付款', class: 'status-pending', icon: 'fa-clock' },
            paid: { text: '待发货', class: 'status-paid', icon: 'fa-check-circle' },
            shipped: { text: '待收货', class: 'status-shipped', icon: 'fa-truck' },
            completed: { text: '已完成', class: 'status-completed', icon: 'fa-check-double' },
            cancelled: { text: '已取消', class: 'status-cancelled', icon: 'fa-times-circle' }
        };

        document.addEventListener('DOMContentLoaded', function() {
            const user = getCurrentUser();
            if (!user) {
                showToast('请先登录', 'error');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                return;
            }
            currentUser = user;
            updateUserSection();
            updateCartBadge();
            loadOrders();
            setupEventListeners();
        });

        function updateUserSection() {
            const userSection = document.getElementById('userSection');
            if (currentUser) {
                userSection.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center"><i class="fas fa-user text-purple-600"></i></div>
                        <span class="text-sm text-gray-600 hidden sm:block">${currentUser.username}</span>
                        <button onclick="logout()" class="text-sm text-red-500 hover:text-red-600"><i class="fas fa-sign-out-alt"></i></button>
                    </div>`;
            }
        }

        function logout() {
            clearCurrentUser();
            showToast('已退出登录', 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 1000);
        }

        function loadOrders() {
            getOrders(currentUser.id).then(function(data) {
                orders = data || [];
                renderOrders();
            }).catch(function(err) {
                console.error('加载订单失败:', err);
                orders = [];
                renderOrders();
            });
        }

        function renderOrders() {
            const orderList = document.getElementById('orderList');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = currentStatus === 'all' ? orders : orders.filter(o => o.status === currentStatus);

            if (filtered.length === 0) {
                orderList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            orderList.innerHTML = filtered.map(order => {
                const status = statusMap[order.status] || statusMap.pending;
                const firstItem = order.items && order.items[0];
                const itemCount = order.items ? order.items.reduce((sum, item) => sum + item.quantity, 0) : 0;
                
                return `
                    <div class="order-card bg-white rounded-xl shadow-sm mb-4 overflow-hidden">
                        <div class="px-4 py-3 border-b bg-gray-50 flex justify-between items-center">
                            <div class="flex items-center text-sm text-gray-500">
                                <span class="mr-4">订单号: ${order.id}</span>
                                <span>${formatDate(order.createTime)}</span>
                            </div>
                            <span class="status-badge ${status.class}"><i class="fas ${status.icon} mr-1"></i>${status.text}</span>
                        </div>
                        <div class="p-4">
                            <div class="flex items-start space-x-4">
                                ${firstItem ? `
                                    <img src="${firstItem.image || 'https://via.placeholder.com/80'}" alt="${firstItem.productName}" class="w-20 h-20 object-cover rounded-lg bg-gray-100">
                                    <div class="flex-1">
                                        <h3 class="font-medium text-gray-800 mb-1">${firstItem.productName}</h3>
                                        <p class="text-sm text-gray-500">${order.items.length > 1 ? `等 ${itemCount} 件商品` : `x${firstItem.quantity}`}</p>
                                    </div>
                                ` : '<div class="text-gray-400">商品信息加载中...</div>'}
                                <div class="text-right">
                                    <p class="text-lg font-bold text-gray-800">¥${order.totalAmount}</p>
                                    <div class="mt-3 space-x-2">${getActionButtons(order)}</div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function getActionButtons(order) {
            const buttons = [];
            if (order.status === 'pending') {
                buttons.push(`<button onclick="payOrder('${order.id}')" class="px-4 py-2 bg-purple-600 text-white text-sm rounded-lg hover:bg-purple-700 transition">立即支付</button>`);
                buttons.push(`<button onclick="cancelOrder('${order.id}')" class="px-4 py-2 border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition">取消订单</button>`);
            } else if (order.status === 'shipped') {
                buttons.push(`<button onclick="confirmReceive('${order.id}')" class="px-4 py-2 bg-purple-600 text-white text-sm rounded-lg hover:bg-purple-700 transition">确认收货</button>`);
            }
            buttons.push(`<button onclick="viewOrderDetail('${order.id}')" class="px-4 py-2 border border-gray-300 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition">查看详情</button>`);
            return buttons.join('');
        }

        function viewOrderDetail(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            // 简单用 alert 展示详情，后续可改成弹窗
            alert(`订单详情\n订单号：${order.id}\n状态：${statusMap[order.status]?.text || order.status}\n金额：¥${order.totalAmount}\n收货人：${order.receiverName}\n地址：${order.address}\n备注：${order.remark || '无'}`);
        }

        function payOrder(orderId) {
            showToast('跳转支付页面...', 'success');
            setTimeout(() => {
                updateOrderStatus(orderId, 'paid').then(function() {
                    loadOrders();
                    showToast('支付成功！', 'success');
                }).catch(function() {
                    showToast('支付状态更新失败', 'error');
                });
            }, 1000);
        }

        function cancelOrder(orderId) {
            if (!confirm('确定要取消该订单吗？')) return;
            updateOrderStatus(orderId, 'cancelled').then(function() {
                loadOrders();
                showToast('订单已取消', 'success');
            }).catch(function() {
                showToast('取消订单失败', 'error');
            });
        }

        function confirmReceive(orderId) {
            if (!confirm('确认已收到商品？')) return;
            updateOrderStatus(orderId, 'completed').then(function() {
                loadOrders();
                showToast('确认收货成功', 'success');
            }).catch(function() {
                showToast('确认收货失败', 'error');
            });
        }

        function setupEventListeners() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); });
                    btn.classList.remove('tab-inactive'); btn.classList.add('tab-active');
                    currentStatus = btn.dataset.status;
                    renderOrders();
                });
            });
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartCount');
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); }
        }
    </script>
</body>
</html>
