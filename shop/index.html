<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜礼商城 - 员工福利优选</title>
    <meta name="description" content="宜礼商城为企业员工提供精选福利商品，涵盖电子卡券、实物礼品等，品质优选，价格实惠。">
    <meta name="keywords" content="宜礼商城,员工福利商城,企业礼品,电子卡券,福利商品">
    <meta property="og:title" content="宜礼商城 - 员工福利优选">
    <meta property="og:description" content="宜礼商城为企业员工提供精选福利商品，涵盖电子卡券、实物礼品等，品质优选，价格实惠。">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .category-btn.active { background: #7c3aed; color: white; }
        .cart-badge { animation: bounce 0.3s; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center">
                    <img src="/assets/logo-purple.jpg" alt="宜礼" class="h-8 w-auto">
                    <span class="ml-2 text-xl font-bold text-gray-800">商城</span>
                </a>
                
                <div class="flex-1 max-w-lg mx-8">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="搜索商品..." 
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:border-purple-500">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <a href="../index.html" class="text-sm text-gray-600 hover:text-purple-600 font-medium">官网</a>
                    <a href="cart.html" class="relative p-2 text-gray-600 hover:text-purple-600">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span id="cartCount" class="cart-badge absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                    </a>
                    <a href="orders.html" class="p-2 text-gray-600 hover:text-purple-600">
                        <i class="fas fa-file-invoice text-xl"></i>
                    </a>
                    <div id="userSection" class="flex items-center space-x-2">
                        <a href="login.html" class="text-sm text-purple-600 hover:text-purple-700 font-medium">登录</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 分类导航 -->
    <div class="bg-white border-b">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex space-x-2 overflow-x-auto">
                <button class="category-btn active px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition" data-category="all">全部商品</button>
                <button class="category-btn px-4 py-2 rounded-full text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 whitespace-nowrap transition" data-category="virtual">电子卡券</button>
                <button class="category-btn px-4 py-2 rounded-full text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 whitespace-nowrap transition" data-category="physical">实物商品</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
        <div id="emptyState" class="hidden text-center py-20">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">暂无商品</p>
        </div>
    </main>

    <footer class="bg-white border-t mt-12">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
            <p>&copy; 2026 宜礼商城 - 专业员工福利解决方案</p>
            <p class="mt-2">客服热线：400-928-9028</p>
        </div>
    </footer>

    <script src="../js/supabase-client.js"></script>
    <script src="shop-data.js"></script>
    <script>
        let products = [];
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentCategory = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartBadge();
            updateUserSection();
            setupEventListeners();
        });

        function loadProducts() {
            // 使用 shop-data.js 的统一数据层（异步，返回 Promise）
            getProducts().then(function(data) {
                products = data || [];
                renderProducts();
            }).catch(function(err) {
                console.error('加载商品失败:', err);
                products = [];
                renderProducts();
            });
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const emptyState = document.getElementById('emptyState');
            
            let filtered = products;
            if (currentCategory !== 'all') {
                filtered = products.filter(p => p.type === currentCategory);
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) || 
                    p.description.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-white rounded-xl overflow-hidden shadow-sm transition-all duration-300 cursor-pointer" onclick="goToProduct(${p.id})">
                    <div class="aspect-square overflow-hidden bg-gray-100">
                        <img src="${p.images[0]}" alt="${p.name}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="p-4">
                        <span class="px-2 py-0.5 text-xs rounded-full ${p.type === 'virtual' ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600'}">${p.type === 'virtual' ? '电子卡券' : '实物商品'}</span>
                        <h3 class="font-medium text-gray-800 mb-1 line-clamp-2 mt-2">${p.name}</h3>
                        <p class="text-sm text-gray-500 mb-3 line-clamp-1">${p.description}</p>
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="text-lg font-bold text-red-500">¥${p.price}</span>
                                ${p.originalPrice > p.price ? `<span class="text-sm text-gray-400 line-through ml-2">¥${p.originalPrice}</span>` : ''}
                            </div>
                            <button onclick="event.stopPropagation(); addToCart(${p.id})" class="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center hover:bg-purple-600 hover:text-white transition">
                                <i class="fas fa-plus text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function goToProduct(id) {
            window.location.href = `product.html?id=${id}`;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(item => item.productId === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({
                    productId: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.images[0],
                    type: product.type,
                    quantity: 1
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showToast('已添加到购物车', 'success');
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartCount');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function updateUserSection() {
            const userSection = document.getElementById('userSection');
            const user = getCurrentUser();
            if (user) {
                userSection.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <span class="text-sm text-gray-600">${user.username}</span>
                        <button onclick="logout()" class="text-sm text-red-500 hover:text-red-600">退出</button>
                    </div>
                `;
            } else {
                userSection.innerHTML = `<a href="login.html" class="text-sm text-purple-600 hover:text-purple-700 font-medium">登录</a>`;
            }
        }

        function logout() {
            clearCurrentUser();
            updateUserSection();
            showToast('已退出登录', 'success');
        }

        function setupEventListeners() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.classList.remove('active');
                        b.classList.add('bg-gray-100', 'text-gray-600');
                    });
                    btn.classList.add('active');
                    btn.classList.remove('bg-gray-100', 'text-gray-600');
                    currentCategory = btn.dataset.category;
                    renderProducts();
                });
            });
            document.getElementById('searchInput').addEventListener('input', renderProducts);
        }
    </script>
</body>
</html>
