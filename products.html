    <!-- 服务流程 -->
    <section class="py-20 bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-3xl font-bold text-gray-900 mb-4">服务流程</h2>
                <p class="text-gray-600">简单四步，轻松上线</p>
            </div>
            <div class="grid md:grid-cols-4 gap-8">
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-white text-2xl font-bold">1</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">需求沟通</h3>
                    <p class="text-gray-600">深入了解企业需求和预算</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-white text-2xl font-bold">2</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">方案定制</h3>
                    <p class="text-gray-600">量身定制福利方案</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-white text-2xl font-bold">3</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">系统对接</h3>
                    <p class="text-gray-600">快速部署，无缝对接</p>
                </div>
                <div class="text-center">
                    <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="text-white text-2xl font-bold">4</span>
                    </div>
                    <h3 class="text-xl font-semibold mb-2">持续服务</h3>
                    <p class="text-gray-600">7×24小时客服支持</p>
                </div>
            </div>
        </div>
    </section>

    <!-- CTA -->
    <section class="py-16 bg-blue-600">
        <div class="max-w-4xl mx-auto px-4 text-center">

            <p class="text-blue-100 mb-8">我们的专家团队随时为您提供咨询服务</p>

    <!-- 页脚 -->

            <p>&copy; 2024 宜礼. 保留所有权利.</p>

    <script>
        var SUPABASE_URL = 'https://ysfmlwdbgwenqtpfntrf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzZm1sd2RiZ3dlbnF0cGZudHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTYxNzUsImV4cCI6MjA5MDk3MjE3NX0.Qnawrj79G8cA6JEMlM2qDV0d20ofZrE4SwxN_K-c0q0';
        
        function loadProducts() {
            var container = document.getElementById('products-container');
            if (!container) return;
            
            container.innerHTML = '<div class="text-center py-10">加载中...</div>';
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', SUPABASE_URL + '/rest/v1/products?select=*', true);
            xhr.setRequestHeader('apikey', SUPABASE_KEY);
            xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        renderProducts(data);
                    } else {
                        container.innerHTML = '<div class="text-center py-10 text-red-500">加载失败</div>';
                    }
                }
            };
            
            xhr.send();
        }
        
        function renderProducts(products) {
            var container = document.getElementById('products-container');
            if (!container) return;
            
            if (products.length === 0) {
                container.innerHTML = '<div class="text-center py-10">暂无产品数据</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                html += '<div class="bg-white rounded-xl overflow-hidden shadow-sm card-hover">';
                html += '<div class="h-56 overflow-hidden">';
                html += '<img src="' + p.image + '" alt="' + (p.image_alt || p.name) + '" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">';
                html += '</div>';
                html += '<div class="p-8">';
                html += '<h3 class="text-2xl font-bold text-gray-900 mb-3">' + p.name + '</h3>';
                html += '<p class="text-gray-600 mb-6">' + p.description + '</p>';
                html += '</div></div>';
            }
            container.innerHTML = html;
        }
        
        // 页面加载
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProducts);
        } else {
            loadProducts();
        }
    </script>
</body>
</html>
