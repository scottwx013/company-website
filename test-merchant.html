<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>商户诊断 - 宜礼</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 5px 0; border-radius: 4px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .info { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
    <h1>商户数据诊断</h1>
    <div id="logs"></div>
    <div id="result"></div>
    
    <script src="js/supabase-api.js"></script>
    <script>
        const logs = document.getElementById('logs');
        const result = document.getElementById('result');
        
        function log(msg, type = 'info') {
            console.log(msg);
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
        }
        
        async function runDiagnostics() {
            log('开始诊断...', 'info');
            
            // 检查 getMerchants 函数
            log('检查 getMerchants 函数...');
            if (typeof getMerchants !== 'function') {
                log('错误: getMerchants 函数未找到', 'error');
                return;
            }
            log('getMerchants 函数存在 ✓', 'success');
            
            // 调用 getMerchants
            log('调用 getMerchants()...');
            try {
                const res = await getMerchants();
                log(`API 响应: success=${res.success}`, res.success ? 'success' : 'error');
                
                if (res.error) {
                    log(`错误信息: ${res.error}`, 'error');
                }
                
                if (res.data) {
                    log(`获取到 ${res.data.length} 个商户`, 'success');
                    
                    // 显示商户列表
                    let html = '<h2>商户列表</h2><ul>';
                    res.data.forEach(m => {
                        html += `<li>${m.name} (${m.city}) - ${m.category || m.coupon_types?.[0] || '无分类'}</li>`;
                    });
                    html += '</ul>';
                    result.innerHTML = html;
                } else {
                    log('没有数据返回', 'error');
                }
            } catch (e) {
                log(`异常: ${e.message}`, 'error');
                console.error(e);
            }
        }
        
        runDiagnostics();
    </script>
</body>
</html>
