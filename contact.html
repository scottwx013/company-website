<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 宜礼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .bg-huawei-blue { background-color: #0052D9; }
        .nav-blur {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        .logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
            transition: transform 0.2s ease;
        }
        .logo-img:hover {
            transform: scale(1.02);
        }
        .nav-blur { backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 导航 -->
    <nav class="nav-blur fixed w-full z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html">
                        <img src="assets/logo-purple.jpg" alt="宜礼" class="logo-img">
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-600 hover:text-blue-600">首页</a>
                    <a href="products.html" class="text-gray-600 hover:text-blue-600">产品服务</a>
                    <a href="merchants.html" class="text-gray-600 hover:text-blue-600">商户网络</a>
                    <a href="shop/index.html" class="text-gray-600 hover:text-purple-600">商城</a>
                    <a href="about.html" class="text-gray-600 hover:text-blue-600">关于我们</a>
                    <a href="contact.html" class="text-gray-900 font-medium hover:text-blue-600">联系我们</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="index.html" class="block px-3 py-2 text-gray-600">首页</a>
                <a href="products.html" class="block px-3 py-2 text-gray-600">产品服务</a>
                <a href="merchants.html" class="block px-3 py-2 text-gray-600">商户网络</a>
                <a href="shop/index.html" class="block px-3 py-2 text-gray-600">商城</a>
                <a href="about.html" class="block px-3 py-2 text-gray-600">关于我们</a>
                <a href="contact.html" class="block px-3 py-2 text-gray-900 font-medium">联系我们</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="pt-32 pb-16 bg-gradient-to-r from-blue-900 to-blue-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">联系我们</h1>
            <p class="text-blue-100 text-xl">期待与您的合作</p>
        </div>
    </section>

    <!-- 联系内容 -->
    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-2 gap-12">
                <!-- 联系信息 -->
                <div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-8">联系方式</h2>
                    
                    <div class="space-y-6">
                        <div class="flex items-start">
                            <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                </svg>
                            </div>
                            <div class="ml-4">
                                <h4 class="font-semibold text-gray-900">服务热线</h4>
                                <p class="text-2xl font-bold text-blue-600" id="company-phone">400-928-9028</p>
                                <p class="text-gray-500 text-sm">工作日 9:00-18:00</p>
                            </div>
                        </div>

                        <div class="flex items-start">
                            <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                </svg>
                            </div>
                            <div class="ml-4">
                                <h4 class="font-semibold text-gray-900">电子邮箱</h4>
                                <p class="text-gray-600" id="company-email">contact@1gift.co</p>
                                <p class="text-gray-500 text-sm">商务合作</p>
                            </div>
                        </div>

                        <div class="flex items-start">
                            <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <div class="ml-4">
                                <h4 class="font-semibold text-gray-900">公司地址</h4>
                                <p class="text-gray-600" id="company-address">江苏省无锡市菱湖大道200号微纳园E2栋</p>
                                <p class="text-gray-500 text-sm">欢迎来访</p>
                            </div>
                        </div>
                    </div>

                    <!-- 微信公众号 -->
                    <div class="mt-10">
                        <h4 class="font-semibold text-gray-900 mb-4">关注我们</h4>
                        <div class="flex flex-col items-start">
                            <p class="text-gray-600 mb-3">扫描二维码关注微信公众号</p>
                            <img src="assets/wechat-qr.jpg" alt="宜礼公众号" class="w-32 h-32 rounded-lg shadow-md">
                        </div>
                    </div>
                </div>

                <!-- 联系表单 -->
                <div class="bg-white rounded-2xl shadow-lg p-8">
                    <h3 class="text-2xl font-bold text-gray-900 mb-6">在线咨询</h3>
                    
                    <form id="contact-form" onsubmit="submitForm(event)">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">您的姓名 *</label>
                                <input type="text" id="form-name" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请输入姓名">
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">公司名称 *</label>
                                <input type="text" id="form-company" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请输入公司名称">
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">联系电话 *</label>
                                <input type="tel" id="form-phone" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请输入手机号">
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 font-medium mb-2">咨询内容</label>
                                <textarea id="form-content" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="请描述您的需求..."></textarea>
                            </div>
                            
                            <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-semibold py-4 rounded-lg hover:bg-blue-700 transition">
                                提交咨询
                            </button>
                            
                            <p id="form-message" class="text-center text-sm hidden"></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-300 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2024 宜礼. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        const API_BASE = '/api/data';
        
        function apiRequest(action, method, body, callback) {
            var xhr = new XMLHttpRequest();
            var url = action ? API_BASE + '?action=' + action : API_BASE;
            xhr.open(method || 'GET', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        if (callback) callback(data);
                    } else {
                        if (callback) callback({success: false});
                    }
                }
            };
            if (body) xhr.send(JSON.stringify(body));
            else xhr.send();
        }
        
        function loadCompany() {
            apiRequest('company', 'GET', null, function(res) {
                if (res.success && res.data) {
                    var data = res.data;
                    if (data.phone) document.getElementById('company-phone').textContent = data.phone;
                    if (data.email) document.getElementById('company-email').textContent = data.email;
                    if (data.address) document.getElementById('company-address').textContent = data.address;
                }
            });
        }
        
        function submitForm(e) {
            e.preventDefault();
            
            var btn = document.getElementById('submit-btn');
            var msg = document.getElementById('form-message');
            var name = document.getElementById('form-name').value;
            var company = document.getElementById('form-company').value;
            var phone = document.getElementById('form-phone').value;
            var content = document.getElementById('form-content').value;
            
            btn.disabled = true;
            btn.textContent = '提交中...';
            msg.className = 'text-center text-sm hidden';
            
            apiRequest('contact', 'POST', {
                name: name,
                company: company,
                phone: phone,
                content: content
            }, function(res) {
                btn.disabled = false;
                if (res.success) {
                    btn.textContent = '提交成功';
                    msg.textContent = '感谢您的咨询！我们的客服人员将在24小时内与您联系。';
                    msg.className = 'text-center text-sm text-green-600 mt-4';
                    document.getElementById('contact-form').reset();
                    setTimeout(function() {
                        btn.textContent = '提交咨询';
                    }, 3000);
                } else {
                    btn.textContent = '提交咨询';
                    msg.textContent = '提交失败，请稍后重试。';
                    msg.className = 'text-center text-sm text-red-600 mt-4';
                }
            });
        }
        
        function toggleMobileMenu() {
            var menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
        
        // 页面加载
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadCompany);
        } else {
            loadCompany();
        }
    </script>
</body>
</html>
