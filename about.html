<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 - 宜礼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .bg-huawei-blue { background-color: #0052D9; }
        .nav-blur {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }
        .logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
            transition: transform 0.2s ease;
        }
        .logo-img:hover {
            transform: scale(1.02);
        }
        .nav-blur { backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }
        .timeline-item { position: relative; padding-left: 2rem; }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.5rem;
            width: 12px;
            height: 12px;
            background: #0052D9;
            border-radius: 50%;
        }
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 1.5rem;
            width: 2px;
            height: calc(100% - 1rem);
            background: #e5e7eb;
        }
        .timeline-item:last-child::after { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 导航 -->
    <nav class="nav-blur fixed w-full z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html">
                        <img src="assets/logo-purple.jpg" alt="宜礼" class="logo-img">
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-600 hover:text-blue-600">首页</a>
                    <a href="products.html" class="text-gray-600 hover:text-blue-600">产品服务</a>
                    <a href="merchants.html" class="text-gray-600 hover:text-blue-600">商户网络</a>
                    <a href="shop/index.html" class="text-gray-600 hover:text-purple-600">商城</a>
                    <a href="about.html" class="text-gray-900 font-medium hover:text-blue-600">关于我们</a>
                    <a href="contact.html" class="text-gray-600 hover:text-blue-600">联系我们</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="index.html" class="block px-3 py-2 text-gray-600">首页</a>
                <a href="products.html" class="block px-3 py-2 text-gray-600">产品服务</a>
                <a href="merchants.html" class="block px-3 py-2 text-gray-600">商户网络</a>
                <a href="shop/index.html" class="block px-3 py-2 text-gray-600">商城</a>
                <a href="about.html" class="block px-3 py-2 text-gray-900 font-medium">关于我们</a>
                <a href="contact.html" class="block px-3 py-2 text-gray-600">联系我们</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="pt-32 pb-16 bg-gradient-to-r from-blue-900 to-blue-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">关于宜礼</h1>
            <p class="text-blue-100 text-xl">让每一家企业都能轻松管理员工福利</p>
        </div>
    </section>

    <!-- 公司简介 -->
    <section class="py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-6">公司简介</h2>
                    <p class="text-gray-600 text-lg mb-6" id="company-story">宜礼成立于2018年，专注于为企业提供专业、高效的员工福利解决方案。</p>
                    <div class="space-y-4">
                        <div>
                            <h4 class="font-semibold text-gray-900">使命</h4>
                            <p class="text-gray-600" id="company-mission">让每一家企业都能轻松管理员工福利，让每一位员工都能享受到贴心的福利关怀。</p>
                        </div>
                        <div>
                            <h4 class="font-semibold text-gray-900">愿景</h4>
                            <p class="text-gray-600" id="company-vision">成为中国最值得信赖的企业福利服务平台。</p>
                        </div>
                    </div>
                </div>
                <div class="bg-blue-50 rounded-2xl p-8">
                    <h3 class="text-xl font-bold text-gray-900 mb-6">核心价值观</h3>
                    <div id="company-values" class="grid grid-cols-2 gap-4">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 发展历程 -->
    <section class="py-20 bg-gray-100">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-3xl font-bold text-gray-900 mb-4">发展历程</h2>
                <p class="text-gray-600">宜礼的成长之路</p>
            </div>
            <div id="milestones-container" class="space-y-8">
                <!-- 动态加载 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-300 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2024 宜礼. 保留所有权利.</p>
        </div>
    </footer>

    <script>
        const API_BASE = '/api/data';
        
        function apiRequest(action, callback) {
            var xhr = new XMLHttpRequest();
            var url = action ? API_BASE + '?action=' + action : API_BASE;
            xhr.open('GET', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.success && callback) {
                        callback(data.data);
                    }
                }
            };
            xhr.send();
        }
        
        function loadAbout() {
            apiRequest('about', function(data) {
                if (data) {
                    renderAbout(data);
                }
            });
        }
        
        function renderAbout(about) {
            if (about.story) {
                var el = document.getElementById('company-story');
                if (el) el.textContent = about.story;
            }
            if (about.mission) {
                var el = document.getElementById('company-mission');
                if (el) el.textContent = about.mission;
            }
            if (about.vision) {
                var el = document.getElementById('company-vision');
                if (el) el.textContent = about.vision;
            }
            
            // 渲染价值观
            if (about.values && about.values.length > 0) {
                var container = document.getElementById('company-values');
                if (container) {
                    var html = '';
                    for (var i = 0; i < about.values.length; i++) {
                        var v = about.values[i];
                        var title = typeof v === 'string' ? v : v.title;
                        var desc = typeof v === 'string' ? '' : v.desc;
                        html += '<div class="bg-white rounded-lg p-4 text-center shadow-sm">';
                        html += '<p class="font-semibold text-gray-900">' + title + '</p>';
                        if (desc) html += '<p class="text-sm text-gray-600 mt-1">' + desc + '</p>';
                        html += '</div>';
                    }
                    container.innerHTML = html;
                }
            }
            
            // 渲染里程碑
            if (about.timeline && about.timeline.length > 0) {
                var container = document.getElementById('milestones-container');
                if (container) {
                    var html = '';
                    for (var i = 0; i < about.timeline.length; i++) {
                        var m = about.timeline[i];
                        html += '<div class="timeline-item pb-8">';
                        html += '<div class="bg-white rounded-xl p-6 shadow-sm">';
                        html += '<span class="text-blue-600 font-bold text-lg">' + m.year + '</span>';
                        html += '<h4 class="font-semibold text-gray-900 mt-1">' + m.title + '</h4>';
                        html += '<p class="text-gray-700 mt-2">' + (m.desc || m.event || '') + '</p>';
                        html += '</div></div>';
                    }
                    container.innerHTML = html;
                }
            }
        }
        
        function toggleMobileMenu() {
            var menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
        
        // 页面加载
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadAbout);
        } else {
            loadAbout();
        }
    </script>
</body>
</html>
